# Desktop release workflow for Nowledge Mem.
#
# Source code is fetched at build time from a separate (private) repo
# via a fine-grained PAT (MEM_REPO_TOKEN, Contents: Read only). Builds
# all desktop bundles (macOS arm64 + x86_64, Windows NSIS, Linux .deb +
# .AppImage + .rpm), signs + notarises macOS, uploads to Cloudflare R2,
# updates the APT repo, drafts a GitHub Release here.
#
# Triggers:
#   workflow_dispatch  — primary mode. Operator fills in the source tag.
#   push tags v*       — auto-trigger when a tag is pushed to THIS repo.
#   repository_dispatch [type: release] — for automation where the source
#                        repo's tag-push fires a dispatch here.
#
# First-time setup: see docs/SETUP.md.

name: release-desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Source tag to build (e.g. 0.8.4 or 0.8.4-ci1). Bare semver triggers publish; anything with a `-` suffix is a dry-run."
        required: true
        type: string
      publish:
        description: "Run publish job (R2 + APT + GH release). Disable for build-only smoke tests."
        required: false
        type: boolean
        default: true
      latest:
        description: "Mark this version as latest in the auto-updater feed."
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"
      - "!v*-rpmtest*"
  repository_dispatch:
    types: [release]

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: read
  actions: write

jobs:
  # -----------------------------------------------------------------------
  # Resolve version + flags. Also exposes `source_ref` so build jobs check
  # out the private repo at the right tag.
  # -----------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      is_dry_run: ${{ steps.resolve.outputs.is_dry_run }}
      run_publish: ${{ steps.resolve.outputs.run_publish }}
      run_latest: ${{ steps.resolve.outputs.run_latest }}
    steps:
      - id: resolve
        name: Resolve version + source ref + flags
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_PUBLISH: ${{ inputs.publish }}
          DISPATCH_LATEST: ${{ inputs.latest }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
          PUSH_REF: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            workflow_dispatch)
              VERSION="$DISPATCH_TAG"
              SOURCE_REF="v${VERSION}"
              PUBLISH="$DISPATCH_PUBLISH"
              LATEST="$DISPATCH_LATEST"
              ;;
            push)
              # tag push on THIS repo — assume the same tag exists on source
              VERSION="${PUSH_REF#v}"
              SOURCE_REF="$PUSH_REF"
              PUBLISH="true"
              LATEST="false"
              ;;
            repository_dispatch)
              VERSION="$PAYLOAD_VERSION"
              SOURCE_REF="$PAYLOAD_REF"
              PUBLISH="true"
              LATEST="false"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac
          # Any pre-release suffix (`-ci*`, `-rc*`, `-beta*`, etc.) is a dry
          # run. Only a bare semver `X.Y.Z` ever publishes. Same gate as
          # the private repo's workflow.
          if [[ "$VERSION" == *-* ]]; then
            DRY="true"; PUBLISH="false"; LATEST="false"
          else
            DRY="false"
          fi
          echo "version=$VERSION"        >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF"  >> "$GITHUB_OUTPUT"
          echo "is_dry_run=$DRY"         >> "$GITHUB_OUTPUT"
          echo "run_publish=$PUBLISH"    >> "$GITHUB_OUTPUT"
          echo "run_latest=$LATEST"      >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION source_ref=$SOURCE_REF dry=$DRY publish=$PUBLISH latest=$LATEST"

  # -----------------------------------------------------------------------
  # Reusable composite-action shape inlined per job below. The "checkout
  # private source + verify package.json version matches" preflight is
  # the same across all five build jobs.
  # -----------------------------------------------------------------------

  build-macos-arm64:
    needs: meta
    runs-on: macos-14
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Verify package.json version matches
        shell: bash
        run: |
          set -euo pipefail
          BASE="${VERSION%%-*}"
          PKG="$(jq -r .version nowledge-graph/package.json)"
          if [[ "$BASE" != "$PKG" ]]; then
            echo "::error::Tag version $BASE does not match nowledge-graph/package.json $PKG"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nowledge-graph/src-tauri
          # Bumped from `macos-aarch64` to invalidate the previously-
          # poisoned cache. The old cache contained a `cargo` binary in
          # ~/.cargo/bin/ that routed to `rustup-init`, breaking every
          # run on this key with `cargo metadata: error: unexpected
          # argument 'metadata' found`. macos-x86_64 wasn't affected —
          # its cache key (macos-x86_64) was never poisoned.
          key: macos-aarch64-v2
          # CRITICAL: do NOT cache ~/.cargo/bin/. The bin dir is small
          # (~50MB) and dtolnay/rust-toolchain rebuilds it fresh every
          # run, so caching has no real upside and one bad save poisons
          # every subsequent run on the same key.
          cache-bin: false

      # Defensive: force rustup proxy symlinks into a known state AFTER
      # the cache restore (in case the bin cache somehow gets re-enabled
      # or a future cache provider regression resurfaces the same shape).
      # `rustup show` prints the resolved toolchain so the log is
      # diagnosable if cargo ever resolves to the wrong binary again.
      - name: Pin default toolchain + sanity check cargo
        run: |
          set -euo pipefail
          rustup default stable
          rustup show
          echo "::group::cargo resolution"
          which cargo
          cargo --version
          ls -la "$HOME/.cargo/bin/" | head -20
          echo "::endgroup::"

      - name: Import code-signing certificate
        shell: bash
        run: |
          set -euo pipefail
          CERT_P12="$RUNNER_TEMP/apple_cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_P12"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Build (arm64, pyarmor, signed, notarized)
        working-directory: nowledge-graph
        run: |
          set -euo pipefail
          unset APPLE_CERTIFICATE
          unset APPLE_CERTIFICATE_PASSWORD
          rm -rf python-standalone
          ./scripts/build-macos.sh --arch arm64 --pyarmor

      - name: Locate + rename DMG
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          DMG="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"
          [[ -n "$DMG" && -f "$DMG" ]] || { echo "::error::No DMG produced"; exit 1; }
          OUT="$RUNNER_TEMP/Nowledge Mem_${VERSION}_aarch64.dmg"
          mv -f "$DMG" "$OUT"
          echo "dmg=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ steps.locate.outputs.dmg }}
          if-no-files-found: error
          retention-days: 7

  build-macos-x86_64:
    needs: meta
    runs-on: macos-14
    timeout-minutes: 120
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nowledge-graph/src-tauri
          key: macos-x86_64

      - name: Import code-signing certificate
        shell: bash
        run: |
          set -euo pipefail
          CERT_P12="$RUNNER_TEMP/apple_cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_P12"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Build (x86_64, pyarmor, signed, notarized)
        working-directory: nowledge-graph
        run: |
          set -euo pipefail
          unset APPLE_CERTIFICATE
          unset APPLE_CERTIFICATE_PASSWORD
          rm -rf python-standalone
          ./scripts/build-macos.sh --arch x86_64 --pyarmor

      - name: Locate + rename DMG
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          DMG="$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"
          [[ -n "$DMG" && -f "$DMG" ]] || { echo "::error::No DMG produced"; exit 1; }
          OUT="$RUNNER_TEMP/Nowledge Mem_${VERSION}_x64.dmg"
          mv -f "$DMG" "$OUT"
          echo "dmg=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: ${{ steps.locate.outputs.dmg }}
          if-no-files-found: error
          retention-days: 7

  build-windows:
    needs: meta
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nowledge-graph/src-tauri
          key: windows-x86_64

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Download Python standalone (Windows)
        working-directory: nowledge-graph
        shell: pwsh
        run: |
          if (Test-Path python-standalone) { Remove-Item python-standalone -Recurse -Force }
          .\scripts\download-python-standalone.ps1

      - name: Build Python bundle (PyArmor)
        working-directory: nowledge-graph
        shell: pwsh
        run: .\scripts\build-python-bundle.ps1 --pyarmor

      - name: Build Tauri (NSIS)
        working-directory: nowledge-graph
        shell: pwsh
        run: npm run tauri:build:windows

      - name: Locate + rename installer
        id: locate
        working-directory: nowledge-graph
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "::error::No NSIS installer produced"; exit 1 }
          $out = Join-Path $env:RUNNER_TEMP "Nowledge Mem_${env:VERSION}_x64-setup.exe"
          Move-Item -Force $exe.FullName $out
          "exe=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 7

  build-linux-deb-appimage:
    needs: meta
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev libxdo-dev \
            patchelf zstd build-essential curl wget file

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nowledge-graph/src-tauri
          key: linux-deb-appimage

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Download Python standalone (Linux x86_64)
        working-directory: nowledge-graph
        run: |
          rm -rf python-standalone
          ./scripts/download-python-standalone.sh

      - name: Build Python bundle (PyArmor)
        working-directory: nowledge-graph
        run: ./scripts/build-python-bundle.sh --pyarmor

      - name: Build .deb + .AppImage (Tauri native)
        working-directory: nowledge-graph
        run: ./scripts/build-linux-packages.sh --deb --appimage

      - name: Locate artifacts
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          DEB="$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"
          APP="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)"
          [[ -f "$DEB" ]] || { echo "::error::No .deb produced"; exit 1; }
          [[ -f "$APP" ]] || { echo "::error::No .AppImage produced"; exit 1; }
          OUT_DEB="$RUNNER_TEMP/Nowledge Mem_${VERSION}_amd64.deb"
          OUT_APP="$RUNNER_TEMP/Nowledge Mem_${VERSION}_amd64.AppImage"
          mv -f "$DEB" "$OUT_DEB"
          mv -f "$APP" "$OUT_APP"
          echo "deb=$OUT_DEB"      >> "$GITHUB_OUTPUT"
          echo "appimage=$OUT_APP" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb-appimage
          path: |
            ${{ steps.locate.outputs.deb }}
            ${{ steps.locate.outputs.appimage }}
          if-no-files-found: error
          retention-days: 7

  build-linux-rpm:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: fedora:40
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Install system deps (Fedora)
        run: |
          dnf install -y \
            webkit2gtk4.1-devel gtk3-devel librsvg2-devel \
            libappindicator-gtk3-devel openssl-devel rpm-build \
            zstd nodejs npm git file findutils which \
            gcc gcc-c++ make patchelf curl wget tar

      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nowledge-graph/src-tauri
          key: linux-rpm-fedora40

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Download Python standalone (Linux x86_64)
        working-directory: nowledge-graph
        run: |
          rm -rf python-standalone
          ./scripts/download-python-standalone.sh

      - name: Build Python bundle (PyArmor)
        working-directory: nowledge-graph
        run: ./scripts/build-python-bundle.sh --pyarmor

      - name: Build native .rpm (Tauri rpmbuild)
        # Tauri's rpm-rs compression is universally slow regardless of
        # algorithm; tauri.linux.conf.json sets compression: { type: "none" }
        # to bypass it. See feedback memory + tauri-apps/tauri#13273.
        working-directory: nowledge-graph
        run: npm run tauri build -- --bundles rpm

      - name: Locate .rpm
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          RPM="$(find src-tauri/target/release/bundle/rpm -name '*.rpm' -print -quit)"
          [[ -f "$RPM" ]] || { echo "::error::No .rpm produced"; exit 1; }
          OUT="$RUNNER_TEMP/$(basename "$RPM")"
          mv -f "$RPM" "$OUT"
          echo "rpm=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: ${{ steps.locate.outputs.rpm }}
          if-no-files-found: error
          retention-days: 7

  # -----------------------------------------------------------------------
  # Pre-release upload: for rc/ci/beta tags, create a draft pre-release GH
  # Release on this repo with all build artifacts attached. The R2 CDN,
  # APT repo, and auto-updater feed are NOT touched — pre-release bundles
  # are only meant for internal testing + as the source for
  # promote-rc-to-ga.yml.
  #
  # Without this job, rc bundles only exist as ephemeral workflow artifacts
  # (90-day retention), which the promote workflow cannot reliably consume
  # and external testers cannot easily download.
  # -----------------------------------------------------------------------
  prerelease-upload:
    needs:
      - meta
      - build-macos-arm64
      - build-macos-x86_64
      - build-windows
      - build-linux-deb-appimage
      - build-linux-rpm
    if: needs.meta.outputs.is_dry_run == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          DMG_ARM="$(find artifacts/macos-arm64 -name '*.dmg' -print -quit)"
          DMG_X64="$(find artifacts/macos-x86_64 -name '*.dmg' -print -quit)"
          EXE_WIN="$(find artifacts/windows-x86_64 -name '*.exe' -print -quit)"
          DEB="$(find artifacts/linux-deb-appimage -name '*.deb' -print -quit)"
          APPIMG="$(find artifacts/linux-deb-appimage -name '*.AppImage' -print -quit)"
          RPM="$(find artifacts/linux-rpm -name '*.rpm' -print -quit)"
          for v in "$DMG_ARM" "$DMG_X64" "$EXE_WIN" "$DEB" "$APPIMG" "$RPM"; do
            [[ -f "$v" ]] || { echo "::error::Missing artifact: $v"; exit 1; }
          done
          {
            echo "dmg_arm=$DMG_ARM"
            echo "dmg_x64=$DMG_X64"
            echo "exe_win=$EXE_WIN"
            echo "deb=$DEB"
            echo "appimg=$APPIMG"
            echo "rpm=$RPM"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft pre-release GH Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # `--prerelease` keeps the auto-updater feed from surfacing this
          # tag. `--draft` lets a maintainer review notes before publishing.
          # `gh release create` is idempotent under the `view||create`
          # pattern so a rerun reuses the existing release.
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" \
            --title "Nowledge Mem ${VERSION} (pre-release)" \
            --prerelease \
            --draft \
            --notes "Pre-release desktop bundles for ${VERSION}. Source: nowledge-co/mem @ ${SOURCE_REF}. Not promoted to :latest or APT. Consumed by promote-rc-to-ga.yml when this rc is ready for GA."
          gh release upload "$TAG" --clobber \
            "${{ steps.paths.outputs.dmg_arm }}" \
            "${{ steps.paths.outputs.dmg_x64 }}" \
            "${{ steps.paths.outputs.exe_win }}" \
            "${{ steps.paths.outputs.deb }}" \
            "${{ steps.paths.outputs.appimg }}" \
            "${{ steps.paths.outputs.rpm }}"

      - name: Summary
        run: |
          {
            echo "### Pre-release ${VERSION} bundles uploaded"
            echo "- GH release: v${VERSION} (draft, pre-release flagged)"
            echo "- Source ref: ${SOURCE_REF}"
            echo "- Distribution: GH Release only (R2/APT/auto-updater feed not touched)"
            echo ""
            echo "Promote to GA via:"
            echo '```'
            echo "gh workflow run promote-rc-to-ga.yml -R ${{ github.repository }} \\"
            echo "  -f rc_tag=${VERSION} \\"
            echo "  -f ga_tag=<x.y.z>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # Publish: R2 + APT + GH Release on this (public) repo.
  # Gated behind `release-publish` environment for manual approval.
  # Three independent guards prevent accidental pre-release publication.
  # -----------------------------------------------------------------------
  publish:
    needs:
      - meta
      - build-macos-arm64
      - build-macos-x86_64
      - build-windows
      - build-linux-deb-appimage
      - build-linux-rpm
    if: needs.meta.outputs.run_publish == 'true'
    runs-on: ubuntu-22.04
    environment: release-publish
    timeout-minutes: 30
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      RUN_LATEST: ${{ needs.meta.outputs.run_latest }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
    steps:
      - name: Pre-flight version safety check
        run: |
          set -euo pipefail
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::Refusing to publish '$VERSION' — pre-release suffix detected."
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not a clean semver."
            exit 1
          fi

      - name: Clone mem-backbone (private)
        env:
          PAT: ${{ secrets.MEM_BACKBONE_PAT }}
        run: |
          set -euo pipefail
          AUTH_B64="$(printf 'x-access-token:%s' "$PAT" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=Authorization: Basic ${AUTH_B64}" \
              clone --depth=1 https://github.com/nowledge-co/mem-backbone.git mem-backbone
          git -C mem-backbone config --unset-all http.https://github.com/.extraheader || true

      - name: Install apt deps for APT repo signing
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg dpkg-dev gzip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mem-backbone npm deps
        working-directory: mem-backbone
        run: npm ci --no-audit --no-fund

      - name: Import GPG signing key
        run: |
          set -euo pipefail
          if [[ -z "$GPG_PRIVATE_KEY" ]]; then
            echo "::warning::GPG_PRIVATE_KEY not set — APT repo update will be skipped."
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "use-agent"                       >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback"          >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry"         >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          DMG_ARM="$(find artifacts/macos-arm64 -name '*.dmg' -print -quit)"
          DMG_X64="$(find artifacts/macos-x86_64 -name '*.dmg' -print -quit)"
          EXE_WIN="$(find artifacts/windows-x86_64 -name '*.exe' -print -quit)"
          DEB="$(find artifacts/linux-deb-appimage -name '*.deb' -print -quit)"
          APPIMG="$(find artifacts/linux-deb-appimage -name '*.AppImage' -print -quit)"
          RPM="$(find artifacts/linux-rpm -name '*.rpm' -print -quit)"
          for v in "$DMG_ARM" "$DMG_X64" "$EXE_WIN" "$DEB" "$APPIMG" "$RPM"; do
            [[ -f "$v" ]] || { echo "::error::Missing artifact: $v"; exit 1; }
          done
          {
            echo "dmg_arm=$DMG_ARM"
            echo "dmg_x64=$DMG_X64"
            echo "exe_win=$EXE_WIN"
            echo "deb=$DEB"
            echo "appimg=$APPIMG"
            echo "rpm=$RPM"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Cloudflare R2
        working-directory: mem-backbone
        run: |
          set -euo pipefail
          node scripts/upload-package.cjs "$VERSION" mac       "${{ steps.paths.outputs.dmg_arm }}"
          node scripts/upload-package.cjs "$VERSION" mac-intel "${{ steps.paths.outputs.dmg_x64 }}"
          node scripts/upload-package.cjs "$VERSION" win       "${{ steps.paths.outputs.exe_win }}"
          node scripts/upload-package.cjs "$VERSION" linux     "${{ steps.paths.outputs.deb }}"
          node scripts/upload-package.cjs "$VERSION" linux     "${{ steps.paths.outputs.appimg }}"
          node scripts/upload-package.cjs "$VERSION" linux     "${{ steps.paths.outputs.rpm }}"

      - name: Update APT repo
        working-directory: mem-backbone
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        run: node scripts/update-apt-repo.cjs "$VERSION" "${{ steps.paths.outputs.deb }}"

      - name: Mark as latest (auto-updater feed)
        if: ${{ needs.meta.outputs.run_latest == 'true' }}
        working-directory: mem-backbone
        run: node scripts/update-latest-version.js "$VERSION"

      - name: Verify download delivery (R2 + APT + Worker)
        working-directory: mem-backbone
        run: |
          set -euo pipefail
          scope='latest,latest-redirect,direct,update'
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            scope="${scope},apt"
          fi
          VERIFY_RELEASE_VERSION="$VERSION" VERIFY_SCOPE="$scope" node scripts/verify-download-delivery.mjs

      - name: Create GitHub release (draft, on this public repo)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # Tag on THIS public repo. If it doesn't exist yet, create it
          # pointing at the workflow's current commit (the README/workflow
          # commit, not source code).
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" \
            --title "Nowledge Mem $VERSION" \
            --draft \
            --notes "Desktop bundles for $VERSION. Source: nowledge-co/mem @ ${SOURCE_REF}. Auto-generated by release-desktop workflow."
          gh release upload "$TAG" --clobber \
            "${{ steps.paths.outputs.dmg_arm }}" \
            "${{ steps.paths.outputs.dmg_x64 }}" \
            "${{ steps.paths.outputs.exe_win }}" \
            "${{ steps.paths.outputs.deb }}" \
            "${{ steps.paths.outputs.appimg }}" \
            "${{ steps.paths.outputs.rpm }}"

      - name: Cleanup workflow artifacts
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ids="$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[].id')"
          for id in $ids; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" \
              >/dev/null 2>&1 && echo "deleted artifact $id" || true
          done

      - name: Summary
        run: |
          echo "### Desktop release $VERSION published"          >> "$GITHUB_STEP_SUMMARY"
          echo "- Source ref: ${SOURCE_REF} (nowledge-co/mem)"   >> "$GITHUB_STEP_SUMMARY"
          echo "- R2 prefix:  app/$VERSION/"                     >> "$GITHUB_STEP_SUMMARY"
          echo "- GH release: v$VERSION (draft, on this repo)"   >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest:     ${RUN_LATEST}"                      >> "$GITHUB_STEP_SUMMARY"
