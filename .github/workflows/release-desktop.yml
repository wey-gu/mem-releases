# Desktop release workflow for Nowledge Mem.
#
# Source code is fetched at build time from a separate (private) repo
# via a fine-grained PAT (MEM_REPO_TOKEN, Contents: Read only). Builds
# all desktop bundles (macOS arm64 + x86_64, Windows NSIS, Linux .deb +
# .AppImage + .rpm), signs + notarises macOS, uploads to Cloudflare R2,
# updates the APT repo, drafts a GitHub Release here.
#
# Triggers:
#   workflow_dispatch  — primary mode. Operator fills in the source tag.
#   push tags v*       — auto-trigger when a tag is pushed to THIS repo.
#   repository_dispatch [type: release] — for automation where the source
#                        repo's tag-push fires a dispatch here.
#
# First-time setup: see docs/SETUP.md.

name: release-desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Source tag to build (e.g. 0.8.4 or 0.8.4-ci1). Bare semver triggers publish; anything with a `-` suffix is a dry-run."
        required: true
        type: string
      publish:
        description: "Run publish job (R2 + APT + GH release). Disable for build-only smoke tests."
        required: false
        type: boolean
        default: true
      latest:
        description: "Mark this version as latest in the auto-updater feed."
        required: false
        type: boolean
        default: false
      build_vulkan:
        description: "ALSO build the OPTIONAL -vulkan GPU variants (Windows + Linux only). Manual downloads only — NEVER added to the auto-updater feed. Off for tag-triggered runs."
        required: false
        type: boolean
        default: false
  push:
    # Auto-fire on RC-style tags ONLY (anything with a `-` suffix:
    # `-rcN`, `-betaN`, `-ciN`). Clean-semver GA tags like `v0.8.4`
    # must NOT auto-fire — they are created as a side-effect when a
    # GH Release draft is published on this repo (the publish step
    # creates the tag), which would otherwise kick off a redundant
    # full rebuild + publish that overwrites R2/APT/auto-updater
    # feed. Seen on 0.8.4: publishing the draft fired a runaway
    # release-desktop that we had to cancel mid-build.
    #
    # GA path is now: cut RC tag(s) -> rc workflows run automatically
    # -> smoke -> promote-rc-to-ga.yml on this repo creates the GA
    # GH Release draft -> publish that draft (which DOES create the
    # v<ga> git tag here, but the trigger no longer fires).
    tags:
      - "v*-*"
      - "!v*-rpmtest*"
  repository_dispatch:
    types: [release]

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: read
  actions: write

jobs:
  # -----------------------------------------------------------------------
  # Resolve version + flags. Also exposes `source_ref` so build jobs check
  # out the private repo at the right tag.
  # -----------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      is_dry_run: ${{ steps.resolve.outputs.is_dry_run }}
      run_publish: ${{ steps.resolve.outputs.run_publish }}
      run_latest: ${{ steps.resolve.outputs.run_latest }}
      run_vulkan: ${{ steps.resolve.outputs.run_vulkan }}
    steps:
      - id: resolve
        name: Resolve version + source ref + flags
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_PUBLISH: ${{ inputs.publish }}
          DISPATCH_LATEST: ${{ inputs.latest }}
          DISPATCH_VULKAN: ${{ inputs.build_vulkan }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
          PUSH_REF: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # VULKAN is the OPTIONAL -vulkan GPU variant gate. It is ONLY ever
          # opt-in via the workflow_dispatch `build_vulkan` input; tag-push and
          # repository_dispatch triggers always leave it off, so the normal
          # automated release path is byte-for-byte unchanged.
          VULKAN="false"
          case "$EVENT_NAME" in
            workflow_dispatch)
              VERSION="$DISPATCH_TAG"
              SOURCE_REF="v${VERSION}"
              PUBLISH="$DISPATCH_PUBLISH"
              LATEST="$DISPATCH_LATEST"
              VULKAN="$DISPATCH_VULKAN"
              ;;
            push)
              # tag push on THIS repo — assume the same tag exists on source
              VERSION="${PUSH_REF#v}"
              SOURCE_REF="$PUSH_REF"
              PUBLISH="true"
              LATEST="false"
              ;;
            repository_dispatch)
              VERSION="$PAYLOAD_VERSION"
              SOURCE_REF="$PAYLOAD_REF"
              PUBLISH="true"
              LATEST="false"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac
          # Any pre-release suffix (`-ci*`, `-rc*`, `-beta*`, etc.) is a dry
          # run. Only a bare semver `X.Y.Z` ever publishes. Same gate as
          # the private repo's workflow.
          if [[ "$VERSION" == *-* ]]; then
            DRY="true"; PUBLISH="false"; LATEST="false"
          else
            DRY="false"
          fi
          # Normalize VULKAN to a strict true/false ("" from a non-dispatch
          # trigger becomes false). NEVER touches publish/latest/updater.
          if [[ "$VULKAN" == "true" ]]; then VULKAN="true"; else VULKAN="false"; fi
          echo "version=$VERSION"        >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF"  >> "$GITHUB_OUTPUT"
          echo "is_dry_run=$DRY"         >> "$GITHUB_OUTPUT"
          echo "run_publish=$PUBLISH"    >> "$GITHUB_OUTPUT"
          echo "run_latest=$LATEST"      >> "$GITHUB_OUTPUT"
          echo "run_vulkan=$VULKAN"      >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION source_ref=$SOURCE_REF dry=$DRY publish=$PUBLISH latest=$LATEST vulkan=$VULKAN"

  # -----------------------------------------------------------------------
  # NOTE: the former NON-GATING `rust-backend` companion job (strangler
  # Phase 1, via build-rust-bundle.yml) has been retired. 0.10.0 desktop
  # ships RUST-ONLY: each of the five build jobs below now builds its own
  # native nmem-server binary in-place (via build-rust-bundle.{sh,ps1})
  # and bundles it through Tauri's resources, so a separate companion
  # artifact job is no longer needed.
  # -----------------------------------------------------------------------

  # -----------------------------------------------------------------------
  # Reusable composite-action shape inlined per job below. The "checkout
  # private source + verify package.json version matches" preflight is
  # the same across all five build jobs.
  # -----------------------------------------------------------------------

  build-macos-arm64:
    needs: meta
    runs-on: macos-14
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Verify package.json version matches
        shell: bash
        run: |
          set -euo pipefail
          BASE="${VERSION%%-*}"
          PKG="$(jq -r .version nowledge-graph/package.json)"
          if [[ "$BASE" != "$PKG" ]]; then
            echo "::error::Tag version $BASE does not match nowledge-graph/package.json $PKG"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # Defensive: on the macos-14 arm64 runner the rustup proxy ends up
      # routing `cargo` to `rustup-init` when the toolchain target matches
      # the host arch (seen 2026-05-14 — `cargo metadata` printed
      # rustup-init's help text). `rustup default stable` + `rustup show`
      # forces the proxy symlinks into a known state and prints the
      # resolved toolchain so failures are diagnosable from the log.
      - name: Pin default toolchain (workaround for macos-14 arm64 proxy)
        run: |
          set -euo pipefail
          rustup default stable
          rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          # Do NOT cache ~/.cargo/bin/ (small, rebuilt fresh each run by
          # dtolnay/rust-toolchain; caching it once poisoned every later run).
          cache-bin: false
          workspaces: |
            nowledge-graph/src-tauri
            nmem-rs
          # Bumped to -v3 (2026-06-27) to invalidate a SECOND poison: the
          # rust-cache keys on Cargo.lock, not on nmem-rs source, so a
          # source-only change (no dep bump) restored a STALE nmem-server
          # from cache and cargo logged 0 "Compiling" lines — rc<=18 shipped
          # an old backend (missing the feed-503 string, int community ids).
          # Any future source-behavior fix that lands without a Cargo.lock
          # change must bump these keys (all 5 platforms) again.
          # (-v2 had earlier invalidated a poisoned ~/.cargo/bin cargo binary.)
          key: macos-aarch64-v3

      # SOTA build-cache: sccache → R2 (S3). Content-keyed, unbounded, shared
      # across runs/branches. Caches BOTH rust (RUSTC_WRAPPER) and the heavy C++
      # (ladybug + llama.cpp via cmake, which reads CMAKE_<LANG>_COMPILER_LAUNCHER
      # from env — no source patch). Degrades gracefully: if R2 is unreachable
      # sccache compiles locally, the build still succeeds.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Point sccache at R2
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_IDLE_TIMEOUT=0"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_GHA_ENABLED=false"
            echo "SCCACHE_BUCKET=nowledge-mem-sccache"
            echo "SCCACHE_REGION=auto"
            echo "SCCACHE_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "AWS_ACCESS_KEY_ID=${R2_KEY}"
            echo "AWS_SECRET_ACCESS_KEY=${R2_SECRET}"
          } >> "$GITHUB_ENV"

      # Defensive: force rustup proxy symlinks into a known state AFTER
      # the cache restore (in case the bin cache somehow gets re-enabled
      # or a future cache provider regression resurfaces the same shape).
      # `rustup show` prints the resolved toolchain so the log is
      # diagnosable if cargo ever resolves to the wrong binary again.
      - name: Pin default toolchain + sanity check cargo
        run: |
          set -euo pipefail
          rustup default stable
          rustup show
          echo "::group::cargo resolution"
          which cargo
          cargo --version
          ls -la "$HOME/.cargo/bin/" | head -20
          echo "::endgroup::"

      - name: Import code-signing certificate
        shell: bash
        run: |
          set -euo pipefail
          CERT_P12="$RUNNER_TEMP/apple_cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_P12"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      # Native Rust backend toolchain (llama.cpp / ladybug / bindgen).
      # clang ships with Xcode on the macOS runner; we only need cmake + ninja.
      # protobuf: protoc is required by lancedb's lance-datafusion build-script.
      # ladybug's C++ uses C++20 parenthesized-init of aggregates (P0960) via
      # vector::emplace_back → construct_at; clang < 16 (Xcode 15.x) rejects it
      # ("no matching constructor for SegmentCheckpointState"). Select the newest
      # installed Xcode 16+ (clang 16+) before building. Deployment-target stays
      # pinned to 14.0 in build-rust-bundle.sh, so the runtime floor is unchanged.
      - name: Use Xcode 16+ (ladybug C++20 construct_at needs clang 16+)
        run: |
          newest=$(ls -d /Applications/Xcode_1[6-9]*.app /Applications/Xcode_2*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$newest" ]; then sudo xcode-select -s "$newest"; fi
          echo "DEVELOPER_DIR=$(xcode-select -p)"; cc --version
      - name: Install Rust backend build toolchain (macOS)
        run: brew install cmake ninja protobuf

      - name: Build (arm64, rust backend, signed, notarized)
        working-directory: nowledge-graph
        run: |
          set -euo pipefail
          unset APPLE_CERTIFICATE
          unset APPLE_CERTIFICATE_PASSWORD
          rm -rf python-standalone rust-backend
          ./scripts/build-rust-bundle.sh --target aarch64-apple-darwin
          ./scripts/build-macos.sh --arch arm64 --skip-python

      - name: Locate + rename DMG
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          DMG="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"
          [[ -n "$DMG" && -f "$DMG" ]] || { echo "::error::No DMG produced"; exit 1; }
          OUT="$RUNNER_TEMP/Nowledge Mem_${VERSION}_aarch64.dmg"
          mv -f "$DMG" "$OUT"
          echo "dmg=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ steps.locate.outputs.dmg }}
          if-no-files-found: error
          retention-days: 7

  build-macos-x86_64:
    needs: meta
    runs-on: macos-14
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          # Do NOT cache ~/.cargo/bin/ (small, rebuilt fresh each run by
          # dtolnay/rust-toolchain; caching it once poisoned every later run).
          cache-bin: false
          workspaces: |
            nowledge-graph/src-tauri
            nmem-rs
          # -v2 (2026-06-27): invalidate stale-nmem-server cache poison (see macos-aarch64-v3).
          key: macos-x86_64-v2

      # sccache → R2 (see build-macos-arm64 for rationale).
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Point sccache at R2
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_IDLE_TIMEOUT=0"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_GHA_ENABLED=false"
            echo "SCCACHE_BUCKET=nowledge-mem-sccache"
            echo "SCCACHE_REGION=auto"
            echo "SCCACHE_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "AWS_ACCESS_KEY_ID=${R2_KEY}"
            echo "AWS_SECRET_ACCESS_KEY=${R2_SECRET}"
          } >> "$GITHUB_ENV"

      - name: Import code-signing certificate
        shell: bash
        run: |
          set -euo pipefail
          CERT_P12="$RUNNER_TEMP/apple_cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_P12"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      # Native Rust backend toolchain (llama.cpp / ladybug / bindgen).
      # clang ships with Xcode on the macOS runner; we only need cmake + ninja.
      # The x86_64-apple-darwin target is already installed by the
      # dtolnay/rust-toolchain step above; ensure it explicitly here too.
      # ladybug C++20 P0960 (construct_at) needs clang 16+ (Xcode 16+); pick the
      # newest installed Xcode so the cross-compiled C++ deps build.
      - name: Use Xcode 16+ (ladybug C++20 construct_at needs clang 16+)
        run: |
          newest=$(ls -d /Applications/Xcode_1[6-9]*.app /Applications/Xcode_2*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$newest" ]; then sudo xcode-select -s "$newest"; fi
          echo "DEVELOPER_DIR=$(xcode-select -p)"; cc --version
      - name: Install Rust backend build toolchain (macOS)
        run: |
          brew install cmake ninja protobuf
          rustup target add x86_64-apple-darwin

      # RISK H1 (cross-arch build): this compiles the full static stack
      # (llama.cpp + Metal, ladybug/kuzu C++, lancedb, boringssl) for
      # x86_64 ON the arm64 macos-14 runner. This is the highest-risk build
      # of the matrix and may need a native x86_64 runner if the cross-arch
      # C/C++ toolchain misbehaves.
      - name: Build (x86_64, rust backend, signed, notarized)
        working-directory: nowledge-graph
        run: |
          set -euo pipefail
          unset APPLE_CERTIFICATE
          unset APPLE_CERTIFICATE_PASSWORD
          rm -rf python-standalone rust-backend
          ./scripts/build-rust-bundle.sh --target x86_64-apple-darwin
          ./scripts/build-macos.sh --arch x86_64 --skip-python

      - name: Locate + rename DMG
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          DMG="$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"
          [[ -n "$DMG" && -f "$DMG" ]] || { echo "::error::No DMG produced"; exit 1; }
          OUT="$RUNNER_TEMP/Nowledge Mem_${VERSION}_x64.dmg"
          mv -f "$DMG" "$OUT"
          echo "dmg=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: ${{ steps.locate.outputs.dmg }}
          if-no-files-found: error
          retention-days: 7

  build-windows:
    needs: meta
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          # Do NOT cache ~/.cargo/bin/ (small, rebuilt fresh each run by
          # dtolnay/rust-toolchain; caching it once poisoned every later run).
          cache-bin: false
          workspaces: |
            nowledge-graph/src-tauri
            nmem-rs
          # -v2 (2026-06-27): invalidate stale-nmem-server cache poison (see macos-aarch64-v3).
          key: windows-x86_64-v2

      # sccache → R2 (see build-macos-arm64 for rationale). MSVC + cmake are
      # both sccache-cacheable; graceful local fallback on any backend error.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Point sccache at R2
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_IDLE_TIMEOUT=0"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_GHA_ENABLED=false"
            echo "SCCACHE_BUCKET=nowledge-mem-sccache"
            echo "SCCACHE_REGION=auto"
            echo "SCCACHE_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "AWS_ACCESS_KEY_ID=${R2_KEY}"
            echo "AWS_SECRET_ACCESS_KEY=${R2_SECRET}"
          } >> "$GITHUB_ENV"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      # Native Rust backend toolchain (llama.cpp / ladybug / bindgen).
      # MSVC is present on windows-latest; we add LLVM/clang (bindgen),
      # ninja, and cmake.
      - name: Install Rust backend build toolchain (Windows)
        shell: pwsh
        run: |
          choco install -y llvm ninja cmake protoc
          rustup target add x86_64-pc-windows-msvc
          # choco updates the *machine* PATH, but the next step's process PATH does
          # not always pick it up (known choco-on-GHA gotcha) — build-rust-bundle.ps1
          # then fails "protoc not found". Export protoc explicitly for later steps:
          # the script (and prost/lance build-scripts) honor $env:PROTOC, and we also
          # add the choco shim dir to PATH.
          $cb = "C:\ProgramData\chocolatey\bin"
          "$cb" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $protoc = (Get-Command protoc -ErrorAction SilentlyContinue).Source
          if (-not $protoc) { $protoc = Join-Path $cb "protoc.exe" }
          if (Test-Path $protoc) { "PROTOC=$protoc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          Write-Host "protoc resolved to: $protoc"

      - name: Build Rust backend bundle (Windows)
        working-directory: nowledge-graph
        shell: pwsh
        run: .\scripts\build-rust-bundle.ps1 -Target x86_64-pc-windows-msvc

      - name: Build Tauri (NSIS)
        working-directory: nowledge-graph
        shell: pwsh
        run: npm run tauri:build:windows

      - name: Locate + rename installer
        id: locate
        working-directory: nowledge-graph
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "::error::No NSIS installer produced"; exit 1 }
          $out = Join-Path $env:RUNNER_TEMP "Nowledge Mem_${env:VERSION}_x64-setup.exe"
          Move-Item -Force $exe.FullName $out
          "exe=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 7

  build-linux-deb-appimage:
    needs: meta
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev libxdo-dev \
            patchelf zstd build-essential curl wget file \
            libfuse2 \
            cmake clang libclang-dev pkg-config protobuf-compiler \
            gcc-12 g++-12
          # ladybug's bundled simsimd uses AVX512-FP16 (__m512h); ubuntu-22.04's
          # default gcc-11 lacks the intrinsic type (docker's gcc-12 compiles it
          # fine, and the Fedora rpm job's gcc-14 too). Make gcc-12 the default
          # cc/c++ so cmake/cc-rs pick it up for the ladybug C/C++ build.
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-12 100
          # cmake/clang/libclang/pkg-config: native Rust backend toolchain
          # (llama.cpp / ladybug / bindgen). build-essential is already above.
          # libfuse2: required to run `linuxdeploy-plugin-appimage`'s
          # AppImage during Tauri's AppImage bundling step. ubuntu-22.04
          # GH runner images used to ship libfuse2 pre-installed; the
          # 2026-05-15 image rotation dropped it, breaking AppImage
          # bundling with the cryptic `failed to run linuxdeploy`. See
          # postmortem/2026-05-15-0.8.4-release-pipeline-cascade.md.

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Do NOT cache ~/.cargo/bin/ (small, rebuilt fresh each run by
          # dtolnay/rust-toolchain; caching it once poisoned every later run).
          cache-bin: false
          workspaces: |
            nowledge-graph/src-tauri
            nmem-rs
          # -v2 (2026-06-27): invalidate stale-nmem-server cache poison (see macos-aarch64-v3).
          key: linux-deb-appimage-v2

      # sccache → R2 (see build-macos-arm64 for rationale).
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Point sccache at R2
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_IDLE_TIMEOUT=0"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_GHA_ENABLED=false"
            echo "SCCACHE_BUCKET=nowledge-mem-sccache"
            echo "SCCACHE_REGION=auto"
            echo "SCCACHE_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "AWS_ACCESS_KEY_ID=${R2_KEY}"
            echo "AWS_SECRET_ACCESS_KEY=${R2_SECRET}"
          } >> "$GITHUB_ENV"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Build Rust backend bundle (Linux x86_64)
        working-directory: nowledge-graph
        run: ./scripts/build-rust-bundle.sh --target x86_64-unknown-linux-gnu

      - name: Build .deb + .AppImage (Tauri native)
        working-directory: nowledge-graph
        # APPIMAGE_EXTRACT_AND_RUN=1 is belt-and-suspenders next to the
        # libfuse2 install above: it makes inner AppImages extract their
        # squashfs and run from a temp dir instead of FUSE-mounting it.
        # Either alone would fix the immediate breakage; both together
        # survive future runner-image churn (libfuse2 removed AGAIN, or
        # FUSE blocked by kernel module changes).
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./scripts/build-linux-packages.sh --deb --appimage

      - name: Locate artifacts
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          DEB="$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"
          APP="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)"
          [[ -f "$DEB" ]] || { echo "::error::No .deb produced"; exit 1; }
          [[ -f "$APP" ]] || { echo "::error::No .AppImage produced"; exit 1; }
          OUT_DEB="$RUNNER_TEMP/Nowledge Mem_${VERSION}_amd64.deb"
          OUT_APP="$RUNNER_TEMP/Nowledge Mem_${VERSION}_amd64.AppImage"
          mv -f "$DEB" "$OUT_DEB"
          mv -f "$APP" "$OUT_APP"
          echo "deb=$OUT_DEB"      >> "$GITHUB_OUTPUT"
          echo "appimage=$OUT_APP" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb-appimage
          path: |
            ${{ steps.locate.outputs.deb }}
            ${{ steps.locate.outputs.appimage }}
          if-no-files-found: error
          retention-days: 7

  build-linux-rpm:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: fedora:40
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Install system deps (Fedora)
        run: |
          dnf install -y \
            webkit2gtk4.1-devel gtk3-devel librsvg2-devel \
            libappindicator-gtk3-devel openssl-devel rpm-build \
            zstd nodejs npm git file findutils which \
            gcc gcc-c++ make patchelf curl wget tar \
            cmake clang-devel ninja-build protobuf-compiler protobuf-devel
          # protobuf-devel: Fedora's protobuf-compiler ships only the protoc
          # binary, NOT the well-known .proto includes (google/protobuf/*.proto)
          # that lance-encoding's build-script imports. apt/brew/choco bundle
          # them; Fedora splits them into protobuf-devel.
          # cmake/clang-devel/ninja-build + gcc-c++ (already above): native
          # Rust backend toolchain (llama.cpp / ladybug / bindgen).

      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          # Do NOT cache ~/.cargo/bin/ (small, rebuilt fresh each run by
          # dtolnay/rust-toolchain; caching it once poisoned every later run).
          cache-bin: false
          workspaces: |
            nowledge-graph/src-tauri
            nmem-rs
          # -v2 (2026-06-27): invalidate stale-nmem-server cache poison (see macos-aarch64-v3).
          key: linux-rpm-fedora40-v2

      # sccache → R2 (see build-macos-arm64 for rationale). Fedora container.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Point sccache at R2
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_IDLE_TIMEOUT=0"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_GHA_ENABLED=false"
            echo "SCCACHE_BUCKET=nowledge-mem-sccache"
            echo "SCCACHE_REGION=auto"
            echo "SCCACHE_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "AWS_ACCESS_KEY_ID=${R2_KEY}"
            echo "AWS_SECRET_ACCESS_KEY=${R2_SECRET}"
          } >> "$GITHUB_ENV"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Build Rust backend bundle (Linux x86_64)
        working-directory: nowledge-graph
        run: ./scripts/build-rust-bundle.sh --target x86_64-unknown-linux-gnu

      - name: Build native .rpm (Tauri rpmbuild)
        # Tauri's rpm-rs compression is universally slow regardless of
        # algorithm; tauri.linux.conf.json sets compression: { type: "none" }
        # to bypass it. See feedback memory + tauri-apps/tauri#13273.
        working-directory: nowledge-graph
        run: npm run tauri build -- --bundles rpm

      - name: Locate .rpm
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          RPM="$(find src-tauri/target/release/bundle/rpm -name '*.rpm' -print -quit)"
          [[ -f "$RPM" ]] || { echo "::error::No .rpm produced"; exit 1; }
          OUT="$RUNNER_TEMP/$(basename "$RPM")"
          mv -f "$RPM" "$OUT"
          echo "rpm=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: ${{ steps.locate.outputs.rpm }}
          if-no-files-found: error
          retention-days: 7

  # =======================================================================
  # OPTIONAL -vulkan GPU variant jobs (Windows + Linux only).
  #
  # WHY THESE ARE FULLY SEPARATE JOBS (not matrix entries on the CPU jobs):
  #   - The default CPU build path MUST stay byte-for-byte unchanged when
  #     the opt-in is off. These jobs only run when `meta.run_vulkan` is
  #     'true', which is ONLY set by the workflow_dispatch `build_vulkan`
  #     input. Tag-push / repository_dispatch leave it false, so the normal
  #     automated release is untouched.
  #   - macOS is intentionally absent: Metal is already the default there
  #     (target-cfg dep override), so there is no -vulkan macOS artifact.
  #
  # AUTO-UPDATER SAFETY (the load-bearing invariant):
  #   These jobs are NOT in the `needs:` list of `publish` or
  #   `prerelease-upload`, and they upload to DISTINCTLY-NAMED workflow
  #   artifact buckets (`windows-x86_64-vulkan`, `linux-vulkan`). The
  #   publish/prerelease jobs `find` artifacts only under the CPU bucket
  #   names (`windows-x86_64`, `linux-deb-appimage`, `linux-rpm`), so a
  #   -vulkan artifact can never be picked up by the R2 upload, the APT
  #   repo, or the `Mark as latest` updater-feed step. The -vulkan bundles
  #   are attached DIRECTLY to the GH Release as MANUAL DOWNLOADS ONLY.
  #   See docs/implementation/RUST_DESKTOP_GPU_ACCELERATION.md (CI plan §4).
  # =======================================================================
  build-windows-vulkan:
    needs: meta
    if: ${{ needs.meta.outputs.run_vulkan == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      IS_DRY_RUN: ${{ needs.meta.outputs.is_dry_run }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            nowledge-graph/src-tauri
            nmem-rs
          # Separate cache key from the CPU windows job: the GPU feature pulls
          # in the GGML Vulkan backend, so the compiled artifacts differ and
          # must not share/poison the CPU build cache.
          key: windows-x86_64-vulkan-v1

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Point sccache at R2
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_IDLE_TIMEOUT=0"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_GHA_ENABLED=false"
            echo "SCCACHE_BUCKET=nowledge-mem-sccache"
            echo "SCCACHE_REGION=auto"
            echo "SCCACHE_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "AWS_ACCESS_KEY_ID=${R2_KEY}"
            echo "AWS_SECRET_ACCESS_KEY=${R2_SECRET}"
            # Force the Ninja generator for ALL CMake invocations from the
            # `cmake` Rust crate (llama-cpp-sys-2). This is the load-bearing fix
            # for the -vulkan build: ggml-vulkan builds `vulkan-shaders-gen` as a
            # nested ExternalProject_Add, and an ExternalProject inherits the
            # PARENT's generator. With the default Visual Studio generator the
            # nested host-tool TryCompile runs parallel CL.exe writing one shared
            # vc145.pdb -> `error C1041 ... please use /FS` -> CMake declares the
            # C compiler "broken" -> no cmake_install.cmake -> "Not a file". Ninja
            # writes per-object PDBs and runs no MSBuild PDB race, so both the
            # parent and the inherited nested build configure cleanly. Ninja with
            # MSVC needs the dev environment active (cl.exe + INCLUDE/LIB), set up
            # by the ilammy/msvc-dev-cmd step below. Scoped to this -vulkan job;
            # the CPU windows job is untouched.
            echo "CMAKE_GENERATOR=Ninja"
          } >> "$GITHUB_ENV"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      # Activate the MSVC developer environment (cl.exe, INCLUDE, LIB on the
      # process env) for the whole job. REQUIRED because CMAKE_GENERATOR=Ninja
      # (set above) makes CMake invoke cl.exe directly instead of routing through
      # MSBuild's auto-activation. Without this, Ninja builds fail with "cl.exe
      # not found" / "No CMAKE_CXX_COMPILER could be found". x64 host + target.
      - name: Activate MSVC developer environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Rust backend build toolchain (Windows)
        shell: pwsh
        run: |
          choco install -y llvm ninja cmake protoc
          rustup target add x86_64-pc-windows-msvc
          $cb = "C:\ProgramData\chocolatey\bin"
          "$cb" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $protoc = (Get-Command protoc -ErrorAction SilentlyContinue).Source
          if (-not $protoc) { $protoc = Join-Path $cb "protoc.exe" }
          if (Test-Path $protoc) { "PROTOC=$protoc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 }
          Write-Host "protoc resolved to: $protoc"

      # Vulkan SDK: provides vulkan-1.lib (the import the GGML Vulkan backend
      # hard-links) + glslangValidator/glslc (SPIR-V shader compiler the GGML
      # Vulkan build needs). The official LunarG installer via this action sets
      # VULKAN_SDK for subsequent steps. `vulkan-1.dll` itself ships in System32
      # with every modern GPU driver on the END-USER machine (documented runtime
      # requirement), so no DLL bundling is needed in the installer.
      - name: Install Vulkan SDK (Windows)
        uses: jakoch/install-vulkan-sdk-action@v1.2.5
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true
      - name: Verify Vulkan SDK on PATH
        shell: pwsh
        run: |
          if (-not $env:VULKAN_SDK) { Write-Error "VULKAN_SDK not set after install"; exit 1 }
          Write-Host "VULKAN_SDK = $env:VULKAN_SDK"
          $glslang = Get-Command glslangValidator -ErrorAction SilentlyContinue
          $glslc = Get-Command glslc -ErrorAction SilentlyContinue
          if (-not $glslang -and -not $glslc) {
            # Fall back to the SDK Bin dir if the action did not add it to PATH.
            $sdkBin = Join-Path $env:VULKAN_SDK "Bin"
            "$sdkBin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            Write-Host "Added $sdkBin to PATH for shader compiler"
          }

      - name: Build Rust backend bundle (Windows, Vulkan)
        working-directory: nowledge-graph
        shell: pwsh
        run: .\scripts\build-rust-bundle.ps1 -Target x86_64-pc-windows-msvc -Gpu vulkan

      - name: Build Tauri (NSIS)
        working-directory: nowledge-graph
        shell: pwsh
        run: npm run tauri:build:windows

      - name: Locate + rename installer (-vulkan)
        id: locate
        working-directory: nowledge-graph
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "::error::No NSIS installer produced"; exit 1 }
          $out = Join-Path $env:RUNNER_TEMP "Nowledge Mem_${env:VERSION}_x64-vulkan-setup.exe"
          Move-Item -Force $exe.FullName $out
          "exe=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-vulkan
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error
          retention-days: 7

      # Attach DIRECTLY to the GH Release as a manual download. This is the
      # ONLY distribution path for -vulkan: it never touches R2, APT, or the
      # auto-updater feed. `--clobber` makes a rerun idempotent, and
      # `view || create` tolerates this job racing ahead of the
      # publish / prerelease-upload jobs by creating the tag if needed. We
      # MATCH the release flavor those jobs use so we never accidentally
      # create a GA-flavored release for an rc: a dry-run (rc/ci/beta) gets
      # `--prerelease --draft` (the load-bearing flag that keeps the rc OUT of
      # the auto-updater feed); a clean GA tag gets `--draft`.
      - name: Attach -vulkan installer to GH Release (manual download only)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          FLAGS=(--draft)
          if [[ "$IS_DRY_RUN" == "true" ]]; then FLAGS+=(--prerelease); fi
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 || gh release create "$TAG" -R "$REPO" \
            "${FLAGS[@]}" \
            --title "Nowledge Mem ${VERSION}" \
            --notes "Desktop bundles for ${VERSION}."
          gh release upload "$TAG" -R "$REPO" --clobber "${{ steps.locate.outputs.exe }}"

  build-linux-vulkan:
    needs: meta
    if: ${{ needs.meta.outputs.run_vulkan == 'true' }}
    # 24.04 (not 22.04 like the CPU jobs): llama.cpp's ggml-vulkan needs
    # Vulkan-Hpp >= 1.3.275 (PipelineRobustnessCreateInfoEXT / LayerSettingEXT /
    # eMesaDozen) which 22.04's libvulkan-dev (1.3.204) lacks, AND the `glslc`
    # package. Both are on 24.04. The -vulkan AppImage's glibc floor rises to
    # 2.39 as a result; acceptable for this opt-in GPU artifact.
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      IS_DRY_RUN: ${{ needs.meta.outputs.is_dry_run }}
    steps:
      - name: Checkout private source (nowledge-co/mem)
        uses: actions/checkout@v4
        with:
          repository: nowledge-co/mem
          token: ${{ secrets.MEM_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          submodules: false

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev libxdo-dev \
            patchelf zstd build-essential curl wget file \
            libfuse2 \
            cmake clang libclang-dev pkg-config protobuf-compiler \
            gcc-12 g++-12 \
            libvulkan-dev glslang-tools glslc libvulkan1
          # libvulkan-dev + glslc + glslang-tools: GGML Vulkan build-time deps.
          #   - libvulkan-dev: the vulkan loader dev lib the backend links against.
          #   - glslc: Google shaderc's SPIR-V compiler. ggml-vulkan's CMake does
          #     `find_package(Vulkan COMPONENTS glslc)` and HARD-FAILS without the
          #     `glslc` BINARY ("Could NOT find Vulkan (missing: glslc)").
          #     glslang-tools only provides `glslangValidator`, NOT `glslc`, so it
          #     does NOT satisfy this. On noble (24.04) `glslc` is a real apt
          #     package (universe, source: shaderc) shipping /usr/bin/glslc, which
          #     CMake's FindVulkan picks up off PATH. (22.04 lacks it -> the reason
          #     this job pins 24.04.)
          # libvulkan1 provides libvulkan.so.1 (the runtime loader) which we BUNDLE
          # into the -vulkan AppImage below so it runs on minimal/headless systems
          # without the distro loader package.
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-12 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-12 100

      - name: Verify shader compiler on PATH
        run: |
          set -euo pipefail
          # ggml-vulkan's CMake requires `glslc` SPECIFICALLY (find_package(Vulkan
          # COMPONENTS glslc)). glslangValidator does NOT satisfy it, so this step
          # must REQUIRE glslc and fail fast — accepting glslangValidator as a
          # substitute produced a false-green here while the real CMake build later
          # died with "Could NOT find Vulkan (missing: glslc)".
          if ! command -v glslc >/dev/null 2>&1; then
            echo "::error::glslc (Google shaderc SPIR-V compiler) not on PATH. ggml-vulkan's find_package(Vulkan COMPONENTS glslc) needs it; install the 'glslc' apt package."
            exit 1
          fi
          glslc --version | head -1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nowledge-graph/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            nowledge-graph/src-tauri
            nmem-rs
          # Separate cache key from the CPU linux job (GPU feature -> different
          # compiled artifacts; must not poison the CPU build cache).
          key: linux-vulkan-v1

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Point sccache at R2
        shell: bash
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}
        run: |
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_IDLE_TIMEOUT=0"
            echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
            echo "SCCACHE_GHA_ENABLED=false"
            echo "SCCACHE_BUCKET=nowledge-mem-sccache"
            echo "SCCACHE_REGION=auto"
            echo "SCCACHE_ENDPOINT=https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "AWS_ACCESS_KEY_ID=${R2_KEY}"
            echo "AWS_SECRET_ACCESS_KEY=${R2_SECRET}"
          } >> "$GITHUB_ENV"

      - name: Install npm deps
        working-directory: nowledge-graph
        run: npm ci --no-audit --no-fund

      - name: Build Rust backend bundle (Linux x86_64, Vulkan)
        working-directory: nowledge-graph
        run: ./scripts/build-rust-bundle.sh --target x86_64-unknown-linux-gnu --gpu vulkan

      - name: Build .deb + .AppImage (Tauri native)
        working-directory: nowledge-graph
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./scripts/build-linux-packages.sh --deb --appimage

      # Bundle libvulkan.so.1 into the AppImage so it self-contains the loader
      # and runs on minimal/headless systems that lack the distro vulkan-loader
      # package. The GGML Vulkan backend hard-links libvulkan.so.1 (DT_NEEDED),
      # so without this the -vulkan process would fail to load at startup — the
      # exact failure mode the spec (RUST_DESKTOP_GPU_ACCELERATION.md, "Runtime
      # loader requirement") warns about. We extract the AppImage, drop the
      # loader into usr/lib next to the other bundled libs, and repackage with
      # appimagetool. The CPU AppImage is built by a SEPARATE job and never gains
      # this loader.
      - name: Bundle libvulkan.so.1 into the AppImage
        working-directory: nowledge-graph
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          APP="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)"
          [[ -f "$APP" ]] || { echo "::error::No .AppImage produced for vulkan variant"; exit 1; }
          LOADER="$(ldconfig -p | awk '/libvulkan\.so\.1/{print $NF; exit}')"
          [[ -n "$LOADER" && -f "$LOADER" ]] || LOADER="/usr/lib/x86_64-linux-gnu/libvulkan.so.1"
          [[ -f "$LOADER" ]] || { echo "::error::libvulkan.so.1 not found on runner; cannot bundle"; exit 1; }
          echo "Bundling loader: $LOADER"
          WORK="$(mktemp -d)"
          cp "$APP" "$WORK/app.AppImage"
          ( cd "$WORK" && ./app.AppImage --appimage-extract >/dev/null )
          mkdir -p "$WORK/squashfs-root/usr/lib"
          cp -L "$LOADER" "$WORK/squashfs-root/usr/lib/libvulkan.so.1"
          # appimagetool repackages the AppDir back into a single-file AppImage.
          TOOL="$WORK/appimagetool"
          curl -L -f --retry 3 -o "$TOOL" \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x "$TOOL"
          ARCH=x86_64 "$TOOL" --appimage-extract-and-run "$WORK/squashfs-root" "$WORK/repacked.AppImage"
          mv -f "$WORK/repacked.AppImage" "$APP"
          echo "Repacked AppImage now bundles libvulkan.so.1"

      - name: Locate + rename artifacts (-vulkan)
        id: locate
        working-directory: nowledge-graph
        shell: bash
        run: |
          set -euo pipefail
          DEB="$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"
          APP="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)"
          [[ -f "$DEB" ]] || { echo "::error::No .deb produced"; exit 1; }
          [[ -f "$APP" ]] || { echo "::error::No .AppImage produced"; exit 1; }
          OUT_DEB="$RUNNER_TEMP/Nowledge Mem_${VERSION}_amd64-vulkan.deb"
          OUT_APP="$RUNNER_TEMP/Nowledge Mem_${VERSION}_amd64-vulkan.AppImage"
          mv -f "$DEB" "$OUT_DEB"
          mv -f "$APP" "$OUT_APP"
          echo "deb=$OUT_DEB"      >> "$GITHUB_OUTPUT"
          echo "appimage=$OUT_APP" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-vulkan
          path: |
            ${{ steps.locate.outputs.deb }}
            ${{ steps.locate.outputs.appimage }}
          if-no-files-found: error
          retention-days: 7

      # Attach DIRECTLY to the GH Release as manual downloads only (never R2 /
      # APT / auto-updater). See the Windows -vulkan job for the rationale.
      # NOTE for the lead: the AppImage self-contains libvulkan.so.1 (bundled
      # above). The -vulkan .deb does NOT yet declare a dependency on libvulkan1
      # in its control metadata (that lives in Tauri's bundle config, out of
      # this PR's additive scope), so a -vulkan .deb on a host WITHOUT the distro
      # vulkan loader package would fail to start. The AppImage is the
      # recommended, self-contained Linux -vulkan download.
      - name: Attach -vulkan bundles to GH Release (manual download only)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          FLAGS=(--draft)
          if [[ "$IS_DRY_RUN" == "true" ]]; then FLAGS+=(--prerelease); fi
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 || gh release create "$TAG" -R "$REPO" \
            "${FLAGS[@]}" \
            --title "Nowledge Mem ${VERSION}" \
            --notes "Desktop bundles for ${VERSION}."
          gh release upload "$TAG" -R "$REPO" --clobber \
            "${{ steps.locate.outputs.deb }}" \
            "${{ steps.locate.outputs.appimage }}"

  # -----------------------------------------------------------------------
  # Pre-release upload: for rc/ci/beta tags, create a draft pre-release GH
  # Release on this repo with all build artifacts attached. The R2 CDN,
  # APT repo, and auto-updater feed are NOT touched — pre-release bundles
  # are only meant for internal testing + as the source for
  # promote-rc-to-ga.yml.
  #
  # Without this job, rc bundles only exist as ephemeral workflow artifacts
  # (90-day retention), which the promote workflow cannot reliably consume
  # and external testers cannot easily download.
  # -----------------------------------------------------------------------
  prerelease-upload:
    needs:
      - meta
      - build-macos-arm64
      - build-macos-x86_64
      - build-windows
      - build-linux-deb-appimage
      - build-linux-rpm
    if: needs.meta.outputs.is_dry_run == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          DMG_ARM="$(find artifacts/macos-arm64 -name '*.dmg' -print -quit)"
          DMG_X64="$(find artifacts/macos-x86_64 -name '*.dmg' -print -quit)"
          EXE_WIN="$(find artifacts/windows-x86_64 -name '*.exe' -print -quit)"
          DEB="$(find artifacts/linux-deb-appimage -name '*.deb' -print -quit)"
          APPIMG="$(find artifacts/linux-deb-appimage -name '*.AppImage' -print -quit)"
          RPM="$(find artifacts/linux-rpm -name '*.rpm' -print -quit)"
          for v in "$DMG_ARM" "$DMG_X64" "$EXE_WIN" "$DEB" "$APPIMG" "$RPM"; do
            [[ -f "$v" ]] || { echo "::error::Missing artifact: $v"; exit 1; }
          done
          {
            echo "dmg_arm=$DMG_ARM"
            echo "dmg_x64=$DMG_X64"
            echo "exe_win=$EXE_WIN"
            echo "deb=$DEB"
            echo "appimg=$APPIMG"
            echo "rpm=$RPM"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft pre-release GH Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # `--prerelease` keeps the auto-updater feed from surfacing this
          # tag. `--draft` lets a maintainer review notes before publishing.
          # `gh release create` is idempotent under the `view||create`
          # pattern so a rerun reuses the existing release.
          REPO="${{ github.repository }}"
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 || gh release create "$TAG" -R "$REPO" \
            --title "Nowledge Mem ${VERSION} (pre-release)" \
            --prerelease \
            --draft \
            --notes "Pre-release desktop bundles for ${VERSION}. Source: nowledge-co/mem @ ${SOURCE_REF}. Not promoted to :latest or APT. Consumed by promote-rc-to-ga.yml when this rc is ready for GA."
          gh release upload "$TAG" -R "$REPO" --clobber \
            "${{ steps.paths.outputs.dmg_arm }}" \
            "${{ steps.paths.outputs.dmg_x64 }}" \
            "${{ steps.paths.outputs.exe_win }}" \
            "${{ steps.paths.outputs.deb }}" \
            "${{ steps.paths.outputs.appimg }}" \
            "${{ steps.paths.outputs.rpm }}"

      - name: Summary
        run: |
          {
            echo "### Pre-release ${VERSION} bundles uploaded"
            echo "- GH release: v${VERSION} (draft, pre-release flagged)"
            echo "- Source ref: ${SOURCE_REF}"
            echo "- Distribution: GH Release only (R2/APT/auto-updater feed not touched)"
            echo ""
            echo "Promote to GA via:"
            echo '```'
            echo "gh workflow run promote-rc-to-ga.yml -R ${{ github.repository }} \\"
            echo "  -f rc_tag=${VERSION} \\"
            echo "  -f ga_tag=<x.y.z>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # Publish: R2 + APT + GH Release on this (public) repo.
  # Gated behind `release-publish` environment for manual approval.
  # Three independent guards prevent accidental pre-release publication.
  # -----------------------------------------------------------------------
  publish:
    needs:
      - meta
      - build-macos-arm64
      - build-macos-x86_64
      - build-windows
      - build-linux-deb-appimage
      - build-linux-rpm
    if: needs.meta.outputs.run_publish == 'true'
    runs-on: ubuntu-22.04
    environment: release-publish
    timeout-minutes: 30
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      SOURCE_REF: ${{ needs.meta.outputs.source_ref }}
      RUN_LATEST: ${{ needs.meta.outputs.run_latest }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
    steps:
      - name: Pre-flight version safety check
        run: |
          set -euo pipefail
          if [[ "$VERSION" == *-* ]]; then
            echo "::error::Refusing to publish '$VERSION' — pre-release suffix detected."
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not a clean semver."
            exit 1
          fi

      - name: Clone mem-backbone (private)
        env:
          PAT: ${{ secrets.MEM_BACKBONE_PAT }}
        run: |
          set -euo pipefail
          AUTH_B64="$(printf 'x-access-token:%s' "$PAT" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=Authorization: Basic ${AUTH_B64}" \
              clone --depth=1 https://github.com/nowledge-co/mem-backbone.git mem-backbone
          git -C mem-backbone config --unset-all http.https://github.com/.extraheader || true

      - name: Install apt deps for APT repo signing
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg dpkg-dev gzip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mem-backbone npm deps
        working-directory: mem-backbone
        run: npm ci --no-audit --no-fund

      - name: Import GPG signing key
        run: |
          set -euo pipefail
          if [[ -z "$GPG_PRIVATE_KEY" ]]; then
            echo "::warning::GPG_PRIVATE_KEY not set — APT repo update will be skipped."
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "use-agent"                       >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback"          >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry"         >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          # Resolve to ABSOLUTE paths. Subsequent steps that consume these
          # outputs run with `working-directory: mem-backbone`, so relative
          # `artifacts/...` paths would resolve to `mem-backbone/artifacts/`
          # which doesn't exist. Seen on the 0.8.4 publish run as
          # "Package file not found: artifacts/macos-arm64/Nowledge Mem_...".
          ROOT="$PWD"
          DMG_ARM="$(find artifacts/macos-arm64 -name '*.dmg' -print -quit)"
          DMG_X64="$(find artifacts/macos-x86_64 -name '*.dmg' -print -quit)"
          EXE_WIN="$(find artifacts/windows-x86_64 -name '*.exe' -print -quit)"
          DEB="$(find artifacts/linux-deb-appimage -name '*.deb' -print -quit)"
          APPIMG="$(find artifacts/linux-deb-appimage -name '*.AppImage' -print -quit)"
          RPM="$(find artifacts/linux-rpm -name '*.rpm' -print -quit)"
          for v in "$DMG_ARM" "$DMG_X64" "$EXE_WIN" "$DEB" "$APPIMG" "$RPM"; do
            [[ -f "$v" ]] || { echo "::error::Missing artifact: $v"; exit 1; }
          done
          {
            echo "dmg_arm=${ROOT}/${DMG_ARM}"
            echo "dmg_x64=${ROOT}/${DMG_X64}"
            echo "exe_win=${ROOT}/${EXE_WIN}"
            echo "deb=${ROOT}/${DEB}"
            echo "appimg=${ROOT}/${APPIMG}"
            echo "rpm=${ROOT}/${RPM}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Cloudflare R2
        working-directory: mem-backbone
        run: |
          set -euo pipefail
          node scripts/upload-package.cjs "$VERSION" mac       "${{ steps.paths.outputs.dmg_arm }}"
          node scripts/upload-package.cjs "$VERSION" mac-intel "${{ steps.paths.outputs.dmg_x64 }}"
          node scripts/upload-package.cjs "$VERSION" win       "${{ steps.paths.outputs.exe_win }}"
          node scripts/upload-package.cjs "$VERSION" linux     "${{ steps.paths.outputs.deb }}"
          node scripts/upload-package.cjs "$VERSION" linux     "${{ steps.paths.outputs.appimg }}"
          node scripts/upload-package.cjs "$VERSION" linux     "${{ steps.paths.outputs.rpm }}"

      # Why this step exists: if the publish job runs more than once for
      # the same version (e.g. a downstream step failed and we re-ran),
      # the second upload overwrites R2 but CDN edges that cached the
      # first upload keep serving the OLD bytes for the cache-control's
      # max-age (1 year). Even the cache-control fix landing in
      # mem-backbone (drop `immutable`) only makes new edges revalidate
      # on ETag — already-warmed edges still hold their copy until they
      # naturally evict. Purging eliminates that race entirely.
      #
      # Guarded behind both `CLOUDFLARE_ZONE_ID` and `CLOUDFLARE_API_TOKEN`
      # being set so this is opt-in. CUSTOM_DOMAIN gives the host; default
      # falls back to download-mem.nowledge.co.
      - name: Purge Cloudflare edge cache for uploaded keys
        if: ${{ env.CLOUDFLARE_ZONE_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          set -euo pipefail
          host="${CUSTOM_DOMAIN:-download-mem.nowledge.co}"
          host="${host#https://}"
          host="${host#http://}"
          host="${host%/}"
          urls=(
            "https://${host}/app/${VERSION}/aarch64-apple-darwin.dmg"
            "https://${host}/app/${VERSION}/x86_64-apple-darwin.dmg"
            "https://${host}/app/${VERSION}/x86_64-pc-windows-msvc.exe"
            "https://${host}/app/${VERSION}/x86_64-unknown-linux-gnu.deb"
            "https://${host}/app/${VERSION}/x86_64-unknown-linux-gnu.AppImage"
            "https://${host}/app/${VERSION}/x86_64-unknown-linux-gnu.rpm"
          )
          files_json=$(printf '"%s",' "${urls[@]}")
          files_json="[${files_json%,}]"
          echo "Purging ${#urls[@]} URLs on zone ${CLOUDFLARE_ZONE_ID:0:8}…"
          response="$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"files\":${files_json}}")"
          echo "$response" | python3 -m json.tool
          # purge_cache returns {"success":true,...} on success. Refuse to
          # continue if it didn't, so the verify-download-delivery step
          # downstream catches stale bytes loudly instead of after an
          # ambiguous edge cache window.
          echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)"

      - name: Update APT repo
        working-directory: mem-backbone
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        run: node scripts/update-apt-repo.cjs "$VERSION" "${{ steps.paths.outputs.deb }}"

      - name: Mark as latest (auto-updater feed)
        if: ${{ needs.meta.outputs.run_latest == 'true' }}
        working-directory: mem-backbone
        # `update-latest-version.js` shells out to bare `wrangler deploy`
        # for the Cloudflare Worker that serves the auto-updater feed.
        # `wrangler` isn't a global binary on `ubuntu-22.04`, so we prepend
        # the local `node_modules/.bin` produced by the earlier `npm ci` to
        # PATH. If mem-backbone's package.json ever drops wrangler from
        # deps, the fallback `npm install --no-save wrangler` keeps the
        # step resilient.
        env:
          # The mem-backbone script accepts the wrangler env as a 2nd
          # positional arg (see `scripts/update-latest-version.js`).
          # `run_latest` is only true for clean-semver GA releases, so
          # production is always the right choice here. To support a
          # future staging path, plumb this through a workflow_dispatch
          # input instead of hardcoding — for example:
          #   inputs:
          #     wrangler_env:
          #       default: production
          # …and then set WRANGLER_ENV: ${{ inputs.wrangler_env }}.
          # CLOUDFLARE_API_TOKEN is already exposed at the job-level env
          # block above; wrangler reads it directly.
          WRANGLER_ENV: production
        run: |
          set -euo pipefail
          export PATH="$PWD/node_modules/.bin:$PATH"
          if ! command -v wrangler >/dev/null 2>&1; then
            echo "::warning::wrangler not found in node_modules/.bin; installing inline"
            npm install --no-save --no-audit --no-fund wrangler
            export PATH="$PWD/node_modules/.bin:$PATH"
          fi
          wrangler --version
          node scripts/update-latest-version.js "$VERSION" "$WRANGLER_ENV"

      - name: Verify download delivery (R2 + APT + Worker)
        working-directory: mem-backbone
        # The verify script is read-only and idempotent, but it probes
        # objects that were uploaded to R2 only seconds earlier. The very
        # first edge GET on a freshly-written object can return 200 instead
        # of 206 for a `Range: bytes=0-0` request before Cloudflare settles
        # range support (the HEAD already advertises accept-ranges: bytes —
        # it's pure propagation timing, not a real defect). Seen as a
        # false-negative on 0.8.8 and 0.9.0: every real step (R2 upload, APT,
        # auto-updater feed flip) succeeded, then this step failed on the
        # AppImage range probe; re-running minutes later passed unchanged.
        #
        # Rather than loosen the strict 206 assertion (the desktop
        # auto-updater genuinely needs working range requests for resumable
        # downloads), absorb the settle window here at the process level:
        # a short pre-settle plus bounded retries. Backbone stays untouched.
        run: |
          set -euo pipefail
          scope='latest,latest-redirect,direct,update'
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            scope="${scope},apt"
          fi

          # Let the just-uploaded R2 objects propagate to the edge before the
          # first probe. The largest artifact (AppImage) is the last to settle.
          echo "Pre-settle 20s before first verify attempt…"
          sleep 20

          attempts=5
          delay=15
          for i in $(seq 1 "$attempts"); do
            echo "::group::Verify download delivery (attempt $i/$attempts)"
            if VERIFY_RELEASE_VERSION="$VERSION" VERIFY_SCOPE="$scope" \
                 node scripts/verify-download-delivery.mjs; then
              echo "::endgroup::"
              echo "✅ Download delivery verified on attempt $i."
              exit 0
            fi
            echo "::endgroup::"
            if [[ "$i" -lt "$attempts" ]]; then
              echo "::warning::Verify attempt $i/$attempts failed (likely edge propagation race); retrying in ${delay}s…"
              sleep "$delay"
            fi
          done

          echo "::error::Download delivery verification failed after $attempts attempts."
          exit 1

      - name: Create GitHub release (draft, on this public repo)
        env:
          GH_TOKEN: ${{ github.token }}
          # The publish job clones mem-backbone into a subdir but never
          # checks out THIS repo, so the job's cwd is not a git repository.
          # Without an explicit `-R`, `gh release ...` tries to infer the
          # target repo from git and dies with `fatal: not a git
          # repository`. Pass the repo explicitly. (This step never ran on
          # 0.8.x/0.9.0 because the publish job failed earlier at the
          # verify step; it first surfaced on the 0.9.1 green run.)
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # Tag on THIS public repo. If it doesn't exist yet, create it
          # pointing at the workflow's current commit (the README/workflow
          # commit, not source code).
          gh release view "$TAG" -R "$REPO" >/dev/null 2>&1 || gh release create "$TAG" -R "$REPO" \
            --title "Nowledge Mem $VERSION" \
            --draft \
            --notes "Desktop bundles for $VERSION. Source: nowledge-co/mem @ ${SOURCE_REF}. Auto-generated by release-desktop workflow."
          gh release upload "$TAG" -R "$REPO" --clobber \
            "${{ steps.paths.outputs.dmg_arm }}" \
            "${{ steps.paths.outputs.dmg_x64 }}" \
            "${{ steps.paths.outputs.exe_win }}" \
            "${{ steps.paths.outputs.deb }}" \
            "${{ steps.paths.outputs.appimg }}" \
            "${{ steps.paths.outputs.rpm }}"

      - name: Cleanup workflow artifacts
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ids="$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[].id')"
          for id in $ids; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" \
              >/dev/null 2>&1 && echo "deleted artifact $id" || true
          done

      - name: Summary
        run: |
          echo "### Desktop release $VERSION published"          >> "$GITHUB_STEP_SUMMARY"
